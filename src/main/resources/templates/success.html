<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Complaint Submitted</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2 class="text-success">Complaint Submitted Successfully</h2>

    <p>Your Complaint ID:</p>

    <h1 th:text="${complaintId}"></h1>

    <!-- AI Detected Category -->
    <p class="mt-3">Complaint Category:</p>
    <h4 class="text-info" th:text="${category}"></h4>

    <p class="mt-3">Use this ID to track your complaint.</p>

    <a href="/" class="btn btn-primary mt-3">Go Home</a>

</div>

</body>

</html>
