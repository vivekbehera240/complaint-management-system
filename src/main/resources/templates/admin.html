<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Admin Dashboard</h2>

    <!-- Complaint Statistics -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card text-center bg-primary text-white">
                <div class="card-body">
                    <h5>Total Complaints</h5>
                    <h2 th:text="${total}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center bg-warning text-dark">
                <div class="card-body">
                    <h5>Pending</h5>
                    <h2 th:text="${pending}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center bg-success text-white">
                <div class="card-body">
                    <h5>Resolved</h5>
                    <h2 th:text="${resolved}"></h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Complaints Table -->
    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Complaint</th>
            <th>Category</th>
            <th>Department</th>
            <th>Status</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="c : ${complaints}">

            <td th:text="${c.id}"></td>

            <td th:text="${c.text}"></td>

            <!-- Category Badge -->
            <td>
                <span class="badge bg-primary" th:if="${c.category == 'AC'}" th:text="${c.category}"></span>
                <span class="badge bg-success" th:if="${c.category == 'Food'}" th:text="${c.category}"></span>
                <span class="badge bg-warning text-dark" th:if="${c.category == 'Furniture'}" th:text="${c.category}"></span>
                <span class="badge bg-danger" th:if="${c.category == 'Electrical'}" th:text="${c.category}"></span>
                <span class="badge bg-secondary" th:if="${c.category == 'Cleaning'}" th:text="${c.category}"></span>
            </td>

            <!-- Department -->
            <td>
                <span class="badge bg-info text-dark" th:text="${c.department}"></span>
            </td>

            <!-- Status -->
            <td>
                <span class="badge bg-warning" th:text="${c.status}"></span>
            </td>

            <!-- Image -->
            <td>
                <img th:src="@{${c.imagePath}}" width="120"/>
            </td>

            <!-- Actions -->
            <td>

                <a th:href="@{'/resolve/' + ${c.id}}" class="btn btn-success btn-sm">
                    Resolve
                </a>

                <a th:href="@{'/delete/' + ${c.id}}" class="btn btn-danger btn-sm">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
